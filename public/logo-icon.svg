<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" fill="#0a0f0d" rx="24"/>
  <!-- Central vertical axis -->
  <rect x="58.5" y="18" width="3" height="84" fill="#34d399" opacity="0.35"/>
  <!-- Left arm -->
  <rect x="22" y="33" width="36" height="3" fill="url(#accentGrad)"/>
  <!-- Right arm -->
  <rect x="62" y="33" width="36" height="3" fill="url(#accentGrad)"/>
  <!-- Left scale pan -->
  <rect x="12" y="44" width="26" height="26" rx="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <rect x="18" y="50" width="14" height="14" rx="2" fill="url(#iconGrad)"/>
  <!-- Right scale pan -->
  <rect x="82" y="44" width="26" height="26" rx="4" fill="none" stroke="#6ee7b7" stroke-width="2.5"/>
  <rect x="88" y="50" width="14" height="14" rx="2" fill="url(#accentGrad)"/>
  <!-- Base -->
  <rect x="48" y="98" width="24" height="4" rx="2" fill="#34d399" opacity="0.5"/>
  <rect x="56" y="84" width="8" height="16" rx="2" fill="#34d399" opacity="0.25"/>
  <!-- Data nodes -->
  <circle cx="25" cy="82" r="3.5" fill="#6ee7b7" opacity="0.8"/>
  <circle cx="95" cy="82" r="3.5" fill="#34d399" opacity="0.8"/>
  <line x1="25" y1="82" x2="25" y2="70" stroke="#34d399" stroke-width="1.5" opacity="0.4"/>
  <line x1="95" y1="82" x2="95" y2="70" stroke="#6ee7b7" stroke-width="1.5" opacity="0.4"/>
</svg>
